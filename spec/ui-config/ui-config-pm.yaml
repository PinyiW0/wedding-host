# =============================================================================
# UI 設定檔 - PM 版本
# 填完後交給工程師，工程師會根據此檔案設定 ui-config.yaml
# =============================================================================

# -----------------------------------------------------------------------------
# 專案基本資訊（必填）
# -----------------------------------------------------------------------------
project:
  name: "EverAfter"         # 網站名稱
  description: "Every love story deserves a beautiful EverAfter.每段愛情，都值得擁有美好的幸福結局"   # 網站簡短描述（建議 160 字元內）
  locale: "zh-TW"              # 語系：zh-TW（繁體中文）| en（英文）
  favicon: "/favicon.ico"           # 網站圖示（建議尺寸 32x32 px，ico 檔）

# -----------------------------------------------------------------------------
# SEO 與社群分享設定（選填）
# -----------------------------------------------------------------------------
meta:
  # SEO 關鍵字（以逗號分隔）
  keywords: "wedding, wedding planning, wedding venue, bridal gown, wedding photographer,wedding invitation, wedding checklist, wedding inspiration, wedding vendors,wedding services"

  # 網站作者或團隊名稱
  author: "Andrea"

  # Open Graph 設定（Facebook、LINE 等社群分享用）
  og:
    image: "/og-image.png"     # 分享預覽圖（建議尺寸 1200x630 px）
    type: "website"            # 網站類型：website | article

# -----------------------------------------------------------------------------
# 色彩主題設定
#
# 填寫方式（三選一）：
#   - "#hex"   → 自訂色碼（如 "#E07A5F"），工程師會產生完整色階
#   - "名稱"   → Tailwind 內建色（如 emerald, amber, red, blue）
#   - ""（留空）→ 使用預設色
#
# 留空時的預設色：
#   主色 → green | 輔色 → sky | 成功 → green
#   警告 → amber | 錯誤 → red | 資訊 → blue | 中性色 → neutral
# -----------------------------------------------------------------------------
theme:
  colors:
    primary: "#BE6A52"      # 主色｜陶土橘（accent，僅用於 RSVP／報到等關鍵動作）
    secondary: "#7A7C5E"    # 輔色｜橄欖鼠尾草
    neutral: "#2B2420"      # 中性色｜暖咖啡墨（驅動暖灰階：象牙底＋深咖文字）
    success: "#6E8B6A"      # 成功狀態｜苔綠
    warning: "#C49A4A"      # 警告狀態｜古銅金
    error: "#9B3A34"        # 錯誤狀態｜深酒磚紅（壓深以與主色陶土橘區隔）
    info: "#6E8499"         # 資訊提示｜霧霾藍
    # 設計備註（給工程師）：底色目標象牙 #F7F1E8、大標文字 #2B2420；
    # neutral 以暖灰階生成，若 background 偏白可將 body 底錨定 #F7F1E8。

# -----------------------------------------------------------------------------
# 深色/淺色模式偏好
# -----------------------------------------------------------------------------
colorMode:
  default: "light"   # light（淺色）| dark（深色）
  enabled: false      # 是否允許使用者切換深色/淺色模式：true（允許）| false（不允許）

# -----------------------------------------------------------------------------
# 通知訊息設定
# -----------------------------------------------------------------------------
toast:
  # 顯示時間（秒）
  displaySeconds: 3

  # 顯示位置
  # 可選：右上角 | 左上角 | 上方置中 | 右下角 | 左下角 | 下方置中
  position: "右上角"

# -----------------------------------------------------------------------------
# 表格與列表設定
# -----------------------------------------------------------------------------
table:
  pagination:
    enabled: true            # 是否啟用分頁：true（啟用）| false（不啟用）
    defaultPageSize: 10      # 每頁顯示筆數

  emptyState:
    label: "目前沒有資料"     # 空資料時顯示的文字

# -----------------------------------------------------------------------------
# 刪除確認設定
# 當使用者點擊刪除時，會跳出確認對話框
# -----------------------------------------------------------------------------
delete:
  confirmation:
    title: "確認刪除"                           # 對話框標題
    description: "此操作無法復原，確定要刪除嗎？"  # 對話框內容
    confirmButton:
      label: "刪除"                              # 確認按鈕文字
    cancelButton:
      label: "取消"                              # 取消按鈕文字


# -----------------------------------------------------------------------------
# 測試帳號設定
# 供開發測試使用的帳號，工程師會設定到 Mock API 中
# -----------------------------------------------------------------------------
testAccounts:
  - username: "Andrea"
    password: "Andrea1122"
    role: "管理者"
    description: "可存取所有功能"
  - username: "receptionist"
    password: "star1122"
    role: "接待員"
    description: "依據功能操作"

# -----------------------------------------------------------------------------
# 額外功能需求（請勾選需要的功能，工程師會評估）
# 填 true 表示需要，填 false 表示不需要
# -----------------------------------------------------------------------------
additionalFeatures:
  # 統計圖表（折線圖、長條圖、圓餅圖等）
  charts: false

  # 拖拽排序功能（如：拖拉調整順序）
  dragAndDrop: false

  # 文本編輯器（如：文章編輯、格式化文字）
  richTextEditor: false

  # 進階日期時間選擇器（如：選擇日期範圍）
  advancedDatePicker: false

  # 檔案上傳功能（如：圖片上傳、拖放上傳）
  fileUpload: true

  # 無限滾動（如：滑到底部自動載入更多）
  infiniteScroll: false
