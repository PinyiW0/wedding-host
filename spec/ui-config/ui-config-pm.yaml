# =============================================================================
# UI 設定檔 - PM 版本
# 填完後交給工程師，工程師會根據此檔案設定 ui-config.yaml
# =============================================================================

# -----------------------------------------------------------------------------
# 專案基本資訊（必填）
# -----------------------------------------------------------------------------
project:
  name: "鷹眼偵測系統"         # 網站名稱
  description: "智能訓練分析平台，提供即時動作偵測與數據分析"   # 網站簡短描述（建議 160 字元內）
  locale: "zh-TW"              # 語系：zh-TW（繁體中文）| en（英文）
  favicon: "/favicon.ico"           # 網站圖示（建議尺寸 32x32 px，ico 檔）

# -----------------------------------------------------------------------------
# SEO 與社群分享設定（選填）
# -----------------------------------------------------------------------------
meta:
  # SEO 關鍵字（以逗號分隔）
  keywords: "baseball, statistics, analytics"

  # 網站作者或團隊名稱
  author: "Andrea"

  # Open Graph 設定（Facebook、LINE 等社群分享用）
  og:
    image: "/og-image.png"     # 分享預覽圖（建議尺寸 1200x630 px）
    type: "website"            # 網站類型：website | article

# -----------------------------------------------------------------------------
# 色彩主題設定
#
# 填寫方式（三選一）：
#   - "#hex"   → 自訂色碼（如 "#E07A5F"），工程師會產生完整色階
#   - "名稱"   → Tailwind 內建色（如 emerald, amber, red, blue）
#   - ""（留空）→ 使用預設色
#
# 留空時的預設色：
#   主色 → green | 輔色 → sky | 成功 → green
#   警告 → amber | 錯誤 → red | 資訊 → blue | 中性色 → neutral
# -----------------------------------------------------------------------------
theme:
  colors:
    primary: "#fd6438"      # 主色
    secondary: "#3086fc"    # 輔色
    neutral: "#1C1C1E"      # 中性色
    success: ""      # 成功狀態
    warning: ""      # 警告狀態
    error: ""        # 錯誤狀態
    info: ""         # 資訊提示

# -----------------------------------------------------------------------------
# 深色/淺色模式偏好
# -----------------------------------------------------------------------------
colorMode:
  default: "light"   # light（淺色）| dark（深色）
  enabled: true      # 是否允許使用者切換深色/淺色模式：true（允許）| false（不允許）

# -----------------------------------------------------------------------------
# 通知訊息設定
# -----------------------------------------------------------------------------
toast:
  # 顯示時間（秒）
  displaySeconds: 3

  # 顯示位置
  # 可選：右上角 | 左上角 | 上方置中 | 右下角 | 左下角 | 下方置中
  position: "右上角"

# -----------------------------------------------------------------------------
# 表格與列表設定
# -----------------------------------------------------------------------------
table:
  pagination:
    enabled: true            # 是否啟用分頁：true（啟用）| false（不啟用）
    defaultPageSize: 10      # 每頁顯示筆數

  emptyState:
    label: "目前沒有資料"     # 空資料時顯示的文字

# -----------------------------------------------------------------------------
# 刪除確認設定
# 當使用者點擊刪除時，會跳出確認對話框
# -----------------------------------------------------------------------------
delete:
  confirmation:
    title: "確認刪除"                           # 對話框標題
    description: "此操作無法復原，確定要刪除嗎？"  # 對話框內容
    confirmButton:
      label: "刪除"                              # 確認按鈕文字
    cancelButton:
      label: "取消"                              # 取消按鈕文字


# -----------------------------------------------------------------------------
# 測試帳號設定
# 供開發測試使用的帳號，工程師會設定到 Mock API 中
# -----------------------------------------------------------------------------
testAccounts:
  - username: "admin"
    password: "admin123"
    role: "管理者"
    description: "可存取所有功能"

# -----------------------------------------------------------------------------
# 額外功能需求（請勾選需要的功能，工程師會評估）
# 填 true 表示需要，填 false 表示不需要
# -----------------------------------------------------------------------------
additionalFeatures:
  # 統計圖表（折線圖、長條圖、圓餅圖等）
  charts: false

  # 拖拽排序功能（如：拖拉調整順序）
  dragAndDrop: false

  # 文本編輯器（如：文章編輯、格式化文字）
  richTextEditor: false

  # 進階日期時間選擇器（如：選擇日期範圍）
  advancedDatePicker: false

  # 檔案上傳功能（如：圖片上傳、拖放上傳）
  fileUpload: false

  # 無限滾動（如：滑到底部自動載入更多）
  infiniteScroll: false
